<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde Estou? - Sistema Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
       <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-container, .main-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            margin: 1rem auto;
            transition: 0.3s;
        }

        .login-container {
            max-width: 400px;
        }

        .main-container {
            display: none;
            position: relative;
            min-height: 90vh;
        }

        h1 {
            color: #1e3c72;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .form-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            z-index: 1;
            transition: color 0.3s;
            font-size: 1.1rem;
        }

        .input-icon input,
        .input-icon select,
        .input-icon textarea {
            width: 100%;
            padding: 0.8rem 0.8rem 0.8rem 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            overflow-x: auto;
            display: block;
        }

        .hidden {
            display: none;
        }

        .export-notice {
            color: #2ecc71;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-editar {
            background: #f1c40f;
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-excluir {
            background: #e74c3c;
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .form-buttons button {
            flex: 1;
            min-width: 150px;
            padding: 1rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-ver-itens {
            background: #9b59b6;
        }

        .btn-exportar {
            background: #2ecc71;
        }

        .btn-sair {
            background: #e74c3c;
        }

        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div class="login-container" id="loginContainer">
        <h1>🔑 Onde Estou?</h1>
        <form id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Usuário</label>
                <div class="input-icon">
                    <input type="text" id="username" placeholder="Opcional">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Senha</label>
                <div class="input-icon">
                    <input type="password" id="password" placeholder="Opcional">
                    <i class="fas fa-key"></i>
                </div>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <div class="switch-form">
                <a onclick="toggleRegister()"><i class="fas fa-user-plus"></i> Criar nova conta</a>
            </div>
        </form>

        <form id="registerForm" class="hidden">
            <div class="input-group">
                <label><i class="fas fa-user-edit"></i> Novo Usuário</label>
                <div class="input-icon">
                    <input type="text" id="newUser" placeholder="Opcional">
                    <i class="fas fa-users"></i>
                </div>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Nova Senha</label>
                <div class="input-icon">
                    <input type="password" id="newPassword" placeholder="Opcional">
                    <i class="fas fa-shield-alt"></i>
                </div>
            </div>
            <button type="submit"><i class="fas fa-save"></i> Registrar</button>
            <div class="switch-form">
                <a onclick="toggleRegister()"><i class="fas fa-sign-in-alt"></i> Já tem uma conta? Faça login</a>
            </div>
        </form>
    </div>

    <!-- Interface Principal -->
    <div class="main-container" id="mainContainer">
        <h1>📍 Controle de Patrimônio</h1>
        
        <form id="equipmentForm">
            <div class="form-grid">
                <div class="input-group">
                    <label><i class="fas fa-box"></i> Nome do Item</label>
                    <div class="input-icon">
                        <input type="text" id="itemName" required>
                        <i class="fas fa-tag"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-calendar"></i> Data de Cadastro</label>
                    <div class="input-icon">
                        <input type="date" id="registrationDate" required>
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-map-marker"></i> Local</label>
                    <div class="input-icon">
                        <input type="text" id="location" required>
                        <i class="fas fa-location-arrow"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-tools"></i> Última Manutenção</label>
                    <div class="input-icon">
                        <input type="date" id="lastMaintenance" required>
                        <i class="fas fa-wrench"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-folder"></i> Categoria</label>
                    <div class="input-icon">
                        <select id="category" required>
                            <option value="">Selecione</option>
                            <option>Hardware</option>
                            <option>Periférico</option>
                            <option>Rede</option>
                            <option>Armazenamento</option>
                        </select>
                        <i class="fas fa-list"></i>
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                        <button type="button" onclick="adicionarCategoria()" style="padding: 0.5rem;">
                            <i class="fas fa-plus"></i> Adicionar
                        </button>
                        <button type="button" onclick="editarCategoria()" style="padding: 0.5rem;">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button type="button" onclick="excluirCategoria()" style="padding: 0.5rem;">
                            <i class="fas fa-trash"></i> Excluir
                        </button>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-shopping-cart"></i> Origem da Compra</label>
                    <div class="input-icon">
                        <input type="text" id="purchaseOrigin" required>
                        <i class="fas fa-store"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-dollar-sign"></i> Valor (R$)</label>
                    <div class="input-icon">
                        <input type="number" step="0.01" id="value" required>
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-comment"></i> Observações</label>
                <div class="input-icon">
                    <textarea id="observations" rows="3"></textarea>
                    <i class="fas fa-edit"></i>
                </div>
            </div>
            
            <div class="form-buttons">
                <button type="submit"><i class="fas fa-check-circle"></i> Salvar Item</button>
                <button type="button" class="btn-ver-itens" onclick="mostrarTodosItens()">
                    <i class="fas fa-eye"></i> Ver Itens
                </button>
                <button class="btn-exportar" onclick="exportarPlanilhaCompleta()">
                    <i class="fas fa-file-excel"></i> Gerar Planilha
                </button>
                <button class="btn-sair" onclick="handleSair()">
                    <i class="fas fa-door-open"></i> Sair
                </button>
            </div>
        </form>

        <div class="export-notice" id="exportNotice"></div>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Data</th>
                    <th>Local</th>
                    <th>Manutenção</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <script>
        // Controle de Login
        let editIndex = null;
        let mostrarTodos = false;

        function toggleRegister() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        // Evento de login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showMainInterface();
        });

        // Evento de registro (opcional)
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Funcionalidade de registro desativada. Clique em "Entrar" para acessar o sistema.');
            toggleRegister();
        });

        // Gerenciamento de Inventário
        const equipmentForm = document.getElementById('equipmentForm');
        const inventoryBody = document.getElementById('inventoryBody');
        let hasUnsavedChanges = false;

        equipmentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dados = JSON.parse(localStorage.getItem('inventario')) || [];
            const newEntry = {
                item: document.getElementById('itemName').value,
                date: document.getElementById('registrationDate').value,
                location: document.getElementById('location').value,
                maintenance: document.getElementById('lastMaintenance').value,
                category: document.getElementById('category').value,
                value: document.getElementById('value').value,
                observations: document.getElementById('observations').value
            };

            if(editIndex !== null) {
                dados[editIndex] = newEntry;
                editIndex = null;
            } else {
                dados.push(newEntry);
            }

            localStorage.setItem('inventario', JSON.stringify(dados));
            equipmentForm.reset();
            carregarDadosSalvos();
            hasUnsavedChanges = false;
            localStorage.removeItem('draft');
        });

        // Função para adicionar categoria
        function adicionarCategoria() {
            const novaCategoria = prompt('Digite o nome da nova categoria:');
            if (novaCategoria) {
                const select = document.getElementById('category');
                const option = document.createElement('option');
                option.value = novaCategoria;
                option.text = novaCategoria;
                select.add(option);
            }
        }

        // Função para editar categoria
        function editarCategoria() {
            const select = document.getElementById('category');
            const selectedIndex = select.selectedIndex;
            if (selectedIndex === 0) {
                alert('Selecione uma categoria para editar.');
                return;
            }

            const novoNome = prompt('Digite o novo nome da categoria:');
            if (novoNome) {
                select.options[selectedIndex].text = novoNome;
                select.options[selectedIndex].value = novoNome;
            }
        }

        // Função para excluir categoria
        function excluirCategoria() {
            const select = document.getElementById('category');
            const selectedIndex = select.selectedIndex;
            if (selectedIndex === 0) {
                alert('Selecione uma categoria para excluir.');
                return;
            }

            if (confirm(`Deseja realmente excluir a categoria "${select.options[selectedIndex].text}"?`)) {
                select.remove(selectedIndex);
            }
        }

        // Função para mostrar a interface principal
        function showMainInterface() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            loadDraft();
            carregarDadosSalvos();
        }

        // Função para carregar dados salvos
        function carregarDadosSalvos() {
            const dados = JSON.parse(localStorage.getItem('inventario')) || [];
            inventoryBody.innerHTML = '';
            
            const dadosExibidos = mostrarTodos ? dados : dados.slice(-3);
            
            dadosExibidos.forEach((entry, index) => {
                addToTable(entry, index);
            });
        }

        // Função para adicionar item à tabela
        function addToTable(entry, index) {
            const newRow = document.createElement('tr');
            newRow.setAttribute('data-index', index);
            newRow.innerHTML = `
                <td>${entry.item}</td>
                <td>${entry.date}</td>
                <td>${entry.location}</td>
                <td>${entry.maintenance}</td>
                <td>${entry.category}</td>
                <td>R$ ${parseFloat(entry.value).toFixed(2)}</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn-editar" onclick="editarItem(${index})"><i class="fas fa-edit"></i></button>
                        <button class="btn-excluir" onclick="excluirItem(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            `;
            inventoryBody.appendChild(newRow);
        }

        // Função para excluir item
        function excluirItem(index) {
            if(confirm('Deseja realmente excluir este item permanentemente?')) {
                const dados = JSON.parse(localStorage.getItem('inventario')) || [];
                dados.splice(index, 1);
                localStorage.setItem('inventario', JSON.stringify(dados));
                carregarDadosSalvos();
            }
        }

        // Função para editar item
        function editarItem(index) {
            const dados = JSON.parse(localStorage.getItem('inventario')) || [];
            const item = dados[index];
            
            document.getElementById('itemName').value = item.item;
            document.getElementById('registrationDate').value = item.date;
            document.getElementById('location').value = item.location;
            document.getElementById('lastMaintenance').value = item.maintenance;
            document.getElementById('category').value = item.category;
            document.getElementById('value').value = item.value;
            document.getElementById('observations').value = item.observations;
            
            editIndex = index;
            window.scrollTo(0, 0);
        }

        // Função para sair do sistema
        function handleSair() {
            if (hasUnsavedChanges) {
                const confirmSave = confirm('Deseja salvar o rascunho antes de sair?');
                if (confirmSave) saveDraft();
            }
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            equipmentForm.reset();
            hasUnsavedChanges = false;
        }

        // Função para salvar rascunho
        function saveDraft() {
            const draft = {
                item: document.getElementById('itemName').value,
                date: document.getElementById('registrationDate').value,
                location: document.getElementById('location').value,
                maintenance: document.getElementById('lastMaintenance').value,
                category: document.getElementById('category').value,
                value: document.getElementById('value').value,
                observations: document.getElementById('observations').value
            };
            localStorage.setItem('draft', JSON.stringify(draft));
            alert('Rascunho salvo com sucesso!');
        }

        // Função para carregar rascunho
        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('draft'));
            if (draft) {
                document.getElementById('itemName').value = draft.item || '';
                document.getElementById('registrationDate').value = draft.date || '';
                document.getElementById('location').value = draft.location || '';
                document.getElementById('lastMaintenance').value = draft.maintenance || '';
                document.getElementById('category').value = draft.category || '';
                document.getElementById('value').value = draft.value || '';
                document.getElementById('observations').value = draft.observations || '';
                hasUnsavedChanges = true;
            }
        }

        // Função para exportar planilha
        function exportarPlanilhaCompleta() {
            const itens = JSON.parse(localStorage.getItem('inventario')) || [];
            const csvItens = [
                ['=== ITENS CADASTRADOS ==='],
                ['Item;Data;Local;Manutenção;Categoria;Valor;Observações'],
                ...itens.map(item => [
                    item.item,
                    item.date,
                    item.location,
                    item.maintenance,
                    item.category,
                    item.value,
                    item.observations
                ].join(';'))
            ];

            const csvContent = csvItens.join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Inventario_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();

            const notice = document.getElementById('exportNotice');
            notice.textContent = 'Planilha gerada com sucesso!';
            notice.style.display = 'block';
            setTimeout(() => notice.style.display = 'none', 2000);
        }

        // Função para mostrar todos os itens
        function mostrarTodosItens() {
            mostrarTodos = !mostrarTodos; // Alterna entre mostrar todos e mostrar apenas os últimos 3
            carregarDadosSalvos();
        }

        // Inicialização
        document.getElementById('mainContainer').style.display = 'none';
    </script>
</body>
</html>
